<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — MediCare HMS</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Fraunces:wght@600;700&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    min-height: 100vh;
    background: #0f4c81;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }
  body::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at 20% 50%, rgba(0,180,216,.3) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, rgba(6,214,160,.2) 0%, transparent 50%);
  }
  .login-box {
    background: #fff;
    border-radius: 24px;
    padding: 48px 40px;
    width: 420px;
    position: relative;
    box-shadow: 0 25px 60px rgba(0,0,0,.3);
    animation: slideUp .4s ease;
  }
  @keyframes slideUp { from { opacity:0; transform:translateY(30px); } to { opacity:1; transform:translateY(0); } }
  .brand { text-align: center; margin-bottom: 36px; }
  .brand-icon {
    width: 64px; height: 64px; background: #0f4c81;
    border-radius: 16px; display: flex; align-items: center; justify-content: center;
    font-size: 1.8rem; color: #fff; margin: 0 auto 16px;
  }
  .brand h1 { font-family: 'Fraunces', serif; font-size: 1.8rem; color: #0f4c81; }
  .brand h1 span { color: #00b4d8; }
  .brand p { color: #64748b; font-size: .875rem; margin-top: 4px; }
  .form-group { margin-bottom: 18px; }
  label { display: block; font-size: .78rem; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: .4px; margin-bottom: 6px; }
  .input-wrap { position: relative; }
  .input-wrap i { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: #94a3b8; }
  input {
    width: 100%; padding: 12px 14px 12px 42px;
    border: 1.5px solid #e2e8f0; border-radius: 10px;
    font-family: inherit; font-size: .9rem; color: #1a202c;
    background: #f8fafc; transition: all .2s;
  }
  input:focus { outline: none; border-color: #0f4c81; background: #fff; }
  .btn-login {
    width: 100%; padding: 13px; background: #0f4c81; color: #fff;
    border: none; border-radius: 10px; font-family: inherit;
    font-size: 1rem; font-weight: 700; cursor: pointer; transition: all .2s;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    margin-top: 8px;
  }
  .btn-login:hover { background: #1a6bb5; transform: translateY(-1px); box-shadow: 0 8px 20px rgba(15,76,129,.3); }
  .alert { padding: 12px 16px; border-radius: 8px; font-size: .875rem; margin-bottom: 18px; background: #f8d7da; color: #842029; border: 1px solid #f1aeb5; }
  .hint { text-align: center; margin-top: 20px; padding: 12px; background: #f0f9ff; border-radius: 8px; font-size: .8rem; color: #0369a1; }
</style>
</head>
<body>
<div class="login-box">
  <div class="brand">
    <div class="brand-icon"><i class="fas fa-heartbeat"></i></div>
    <h1>Medi<span>Care</span></h1>
    <p>Hospital Management System</p>
  </div>

  {% if messages %}
    {% for message in messages %}
      <div class="alert">{{ message }}</div>
    {% endfor %}
  {% endif %}

  <form method="POST">
    {% csrf_token %}
    <div class="form-group">
      <label>Username</label>
      <div class="input-wrap">
        <i class="fas fa-user"></i>
        <input type="text" name="username" placeholder="Enter your username" required autofocus>
      </div>
    </div>
    <div class="form-group">
      <label>Password</label>
      <div class="input-wrap">
        <i class="fas fa-lock"></i>
        <input type="password" name="password" placeholder="Enter your password" required>
      </div>
    </div>
    <button type="submit" class="btn-login">
      <i class="fas fa-sign-in-alt"></i> Sign In
    </button>
  </form>

  <div class="hint">
    <i class="fas fa-info-circle"></i>
    Default: <strong>admin</strong> / <strong>admin123</strong> (run setup first)
  </div>
</div>
</body>
</html>
