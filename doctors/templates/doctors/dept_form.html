{% extends 'core/base.html' %}
{% block title %}{{ title }} — MediCare HMS{% endblock %}
{% block page_title %}{{ title }}{% endblock %}
{% block content %}
<div class="page-header">
  <h2>{{ title }}</h2>
  <a href="{% url 'department_list' %}" class="btn btn-outline"><i class="fas fa-arrow-left"></i> Back</a>
</div>
<div class="card" style="max-width:600px;">
  <div class="card-body">
    <form method="POST">
      {% csrf_token %}
      <div class="form-grid">
        <div class="form-group full"><label>Department Name</label>{{ form.name }}</div>
        <div class="form-group full"><label>Description</label>{{ form.description }}</div>
      </div>
      <div style="display:flex;gap:12px;margin-top:24px;">
        <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Save</button>
        <a href="{% url 'department_list' %}" class="btn btn-outline">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
